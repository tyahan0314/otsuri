<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>屋台おつり計算</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #111;
      color: #fff;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      height: 100dvh;
      padding: 8px;
      display: grid;
      grid-template-rows: auto auto auto auto auto 1fr auto auto;
      gap: 7px;
    }

    .title {
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.05;
    }

    .small-note {
      text-align: center;
      font-size: 13px;
      opacity: 0.6;
      font-weight: 700;
    }

    .count-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1.8fr 1fr 1.2fr;
      gap: 7px;
    }

    button {
      border: none;
      border-radius: 15px;
      font-weight: 900;
      color: #fff;
      background: #333;
      font-size: 25px;
      cursor: pointer;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.25);
    }

    .count-button {
      height: 58px;
    }

    .count-display {
      height: 58px;
      border-radius: 15px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 900;
      border: 2px solid #444;
    }

    #setOne,
    #clearReceived {
      background: #0b6b2b;
      color: #fff;
    }

    #minus {
      color: #ff5a5a;
    }

    #plus,
    #plusFive {
      color: #5aa7ff;
    }

    .money-box {
      border-radius: 18px;
      background: #1d1d1d;
      padding: 8px 12px;
      text-align: center;
      border: 2px solid #333;
    }

    .label {
      font-size: 16px;
      font-weight: 900;
      opacity: 0.75;
      margin-bottom: 1px;
    }

    .total {
      font-size: 36px;
      font-weight: 1000;
      line-height: 1;
    }

    .received-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 8px;
    }

    .clear-button {
      height: 62px;
      font-size: 22px;
    }

    .received-display {
      height: 62px;
      border-radius: 16px;
      background: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid #444;
    }

    .received-label {
      font-size: 13px;
      font-weight: 900;
      opacity: 0.75;
      line-height: 1;
    }

    .received-money {
      font-size: 32px;
      font-weight: 1000;
      line-height: 1.05;
    }

    .cash-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .cash-button {
      height: 58px;
      background: #26384d;
      color: #ffffff;
      font-size: 25px;
    }

    .cash-button span {
      font-size: 18px;
      opacity: 0.85;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 7px;
      min-height: 210px;
    }

    .num-button {
      font-size: 30px;
      background: #303030;
    }

    .double-zero {
      font-size: 25px;
    }

    .back-button {
      color: #ff5a5a;
    }

    .change-box {
      border-radius: 20px;
      background: #062b13;
      padding: 8px 12px;
      text-align: center;
      border: 3px solid #0f7a35;
    }

    .change-label {
      font-size: 18px;
      font-weight: 900;
      opacity: 0.9;
    }

    .change-money {
      font-size: 48px;
      font-weight: 1000;
      line-height: 1.05;
    }

    .shortage {
      background: #3a0b0b;
      border-color: #a51d1d;
    }

    .finish-button {
      height: 56px;
      background: #8b1e1e;
      font-size: 26px;
      border-radius: 16px;
    }

    @media (max-height: 670px) {
      .app {
        padding: 6px;
        gap: 5px;
      }

      .title {
        font-size: 18px;
      }

      .small-note {
        font-size: 12px;
      }

      .count-button,
      .count-display {
        height: 50px;
      }

      .count-display {
        font-size: 26px;
      }

      button {
        font-size: 22px;
        border-radius: 13px;
      }

      .money-box {
        padding: 6px 10px;
      }

      .label {
        font-size: 14px;
      }

      .total {
        font-size: 32px;
      }

      .clear-button,
      .received-display {
        height: 54px;
      }

      .clear-button {
        font-size: 20px;
      }

      .received-money {
        font-size: 28px;
      }

      .cash-button {
        height: 50px;
        font-size: 22px;
      }

      .keypad {
        min-height: 180px;
      }

      .num-button {
        font-size: 27px;
      }

      .change-money {
        font-size: 40px;
      }

      .finish-button {
        height: 50px;
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div>
      <div class="title">屋台おつり計算</div>
      <div class="small-note">350円固定</div>
    </div>

    <section class="count-row">
      <button class="count-button" id="setOne">1本</button>
      <button class="count-button" id="minus">−</button>
      <div class="count-display" id="countDisplay">1本</div>
      <button class="count-button" id="plus">＋</button>
      <button class="count-button" id="plusFive">＋5</button>
    </section>

    <section class="money-box">
      <div class="label">販売金額</div>
      <div class="total" id="totalDisplay">¥350</div>
    </section>

    <section class="received-row">
      <button class="clear-button" id="clearReceived">クリア</button>
      <div class="received-display">
        <div class="received-label">受取金額</div>
        <div class="received-money" id="receivedDisplay">¥0</div>
      </div>
    </section>

    <section class="cash-row">
      <button class="cash-button" data-add="1000">+1000</button>
      <button class="cash-button" data-add="500">+500</button>
      <button class="cash-button" data-add="50">+50</button>
    </section>

    <section class="keypad">
      <button class="num-button" data-num="7">7</button>
      <button class="num-button" data-num="8">8</button>
      <button class="num-button" data-num="9">9</button>

      <button class="num-button" data-num="4">4</button>
      <button class="num-button" data-num="5">5</button>
      <button class="num-button" data-num="6">6</button>

      <button class="num-button" data-num="1">1</button>
      <button class="num-button" data-num="2">2</button>
      <button class="num-button" data-num="3">3</button>

      <button class="num-button" data-num="0">0</button>
      <button class="num-button double-zero" data-num="00">00</button>
      <button class="num-button back-button" id="backspace">←</button>
    </section>

    <section class="change-box" id="changeBox">
      <div class="change-label" id="changeLabel">おつり</div>
      <div class="change-money" id="changeDisplay">¥0</div>
    </section>

    <button class="finish-button" id="finish">会計完了</button>
  </main>

  <script>
    const PRICE = 350;

    let count = 1;
    let receivedText = "";

    const countDisplay = document.getElementById("countDisplay");
    const totalDisplay = document.getElementById("totalDisplay");
    const receivedDisplay = document.getElementById("receivedDisplay");
    const changeDisplay = document.getElementById("changeDisplay");
    const changeBox = document.getElementById("changeBox");
    const changeLabel = document.getElementById("changeLabel");

    function yen(value) {
      return "¥" + Number(value).toLocaleString("ja-JP");
    }

    function getReceived() {
      return receivedText === "" ? 0 : Number(receivedText);
    }

    function setReceived(value) {
      if (value <= 0) {
        receivedText = "";
      } else {
        receivedText = String(value);
      }
      update();
    }

    function update() {
      const total = count * PRICE;
      const received = getReceived();
      const change = received - total;

      countDisplay.textContent = count + "本";
      totalDisplay.textContent = yen(total);
      receivedDisplay.textContent = yen(received);

      if (received === 0) {
        changeBox.classList.remove("shortage");
        changeLabel.textContent = "おつり";
        changeDisplay.textContent = yen(0);
        return;
      }

      if (change < 0) {
        changeBox.classList.add("shortage");
        changeLabel.textContent = "不足";
        changeDisplay.textContent = yen(Math.abs(change));
      } else {
        changeBox.classList.remove("shortage");
        changeLabel.textContent = "おつり";
        changeDisplay.textContent = yen(change);
      }
    }

    function resetAll() {
      count = 1;
      receivedText = "";
      update();
    }

    document.getElementById("setOne").addEventListener("click", () => {
      count = 1;
      update();
    });

    document.getElementById("minus").addEventListener("click", () => {
      count = Math.max(1, count - 1);
      update();
    });

    document.getElementById("plus").addEventListener("click", () => {
      count += 1;
      update();
    });

    document.getElementById("plusFive").addEventListener("click", () => {
      count += 5;
      update();
    });

    document.getElementById("clearReceived").addEventListener("click", () => {
      receivedText = "";
      update();
    });

    document.getElementById("finish").addEventListener("click", resetAll);

    document.getElementById("backspace").addEventListener("click", () => {
      receivedText = receivedText.slice(0, -1);
      update();
    });

    document.querySelectorAll(".num-button[data-num]").forEach(button => {
      button.addEventListener("click", () => {
        const num = button.dataset.num;

        if (receivedText.length >= 7) return;

        if (receivedText === "" && (num === "0" || num === "00")) {
          return;
        }

        receivedText += num;

        if (receivedText.length > 7) {
          receivedText = receivedText.slice(0, 7);
        }

        update();
      });
    });

    document.querySelectorAll(".cash-button").forEach(button => {
      button.addEventListener("click", () => {
        const addAmount = Number(button.dataset.add);
        const current = getReceived();
        const next = current + addAmount;

        setReceived(next);
      });
    });

    document.addEventListener("dblclick", function(event) {
      event.preventDefault();
    });

    update();
  </script>
</body>
</html>
