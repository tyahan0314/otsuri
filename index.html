<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>屋台おつり計算</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #111;
      color: #fff;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      height: 100dvh;
      padding: 8px;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 16px;
      font-weight: 900;
      color: #fff;
      background: #303030;
      cursor: pointer;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.25);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.25);
    }

    .count-row {
      display: grid;
      grid-template-columns: 0.85fr 2.1fr 0.85fr 1fr;
      gap: 8px;
    }

    .count-button,
    .count-display {
      height: 76px;
      border-radius: 16px;
    }

    .count-button {
      font-size: 34px;
    }

    .count-display {
      background: #222;
      border: 3px solid #444;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.05;
    }

    .count-main {
      font-size: 34px;
      font-weight: 1000;
    }

    .count-price {
      margin-top: 5px;
      font-size: 26px;
      font-weight: 1000;
      opacity: 0.95;
    }

    #minus {
      color: #ff5a5a;
    }

    #plus,
    #plusFive {
      color: #5aa7ff;
    }

    .received-section {
      background: #1d1d1d;
      border: 3px solid #444;
      border-radius: 20px;
      padding: 8px;
    }

    .received-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 8px;
      align-items: center;
    }

    .clear-button {
      height: 70px;
      background: #0b6b2b;
      font-size: 22px;
    }

    .received-money {
      height: 70px;
      border-radius: 16px;
      background: #222;
      border: 2px solid #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 1000;
      line-height: 1;
      white-space: nowrap;
    }

    .change-section {
      background: #062b13;
      border: 4px solid #0f7a35;
      border-radius: 22px;
      padding: 16px 10px;
      text-align: center;
    }

    .change-money {
      font-size: 50px;
      font-weight: 1000;
      line-height: 1;
      white-space: nowrap;
    }

    .shortage {
      background: #3a0b0b;
      border-color: #a51d1d;
    }

    .cash-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .cash-button {
      height: 68px;
      background: #26384d;
      font-size: 30px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      min-height: 300px;
    }

    .num-button {
      font-size: 36px;
      font-weight: 1000;
    }

    .back-button {
      color: #ff5a5a;
    }

    .finish-button {
      background: #8b1e1e;
      font-size: 21px;
      line-height: 1.1;
      padding: 0 4px;
    }

    @media (max-height: 700px) {
      .app {
        padding: 6px;
        gap: 6px;
      }

      .count-button,
      .count-display {
        height: 62px;
      }

      .count-button {
        font-size: 28px;
      }

      .count-main {
        font-size: 28px;
      }

      .count-price {
        font-size: 22px;
        margin-top: 3px;
      }

      .clear-button,
      .received-money {
        height: 58px;
      }

      .clear-button {
        font-size: 20px;
      }

      .received-money {
        font-size: 29px;
      }

      .change-section {
        padding: 11px 8px;
      }

      .change-money {
        font-size: 41px;
      }

      .cash-button {
        height: 56px;
        font-size: 26px;
      }

      .keypad {
        min-height: 245px;
        gap: 6px;
      }

      .num-button {
        font-size: 30px;
      }

      .finish-button {
        font-size: 18px;
      }
    }

    @media (max-height: 620px) {
      .count-button,
      .count-display {
        height: 54px;
      }

      .count-main {
        font-size: 24px;
      }

      .count-price {
        font-size: 18px;
      }

      .clear-button,
      .received-money {
        height: 50px;
      }

      .received-money {
        font-size: 25px;
      }

      .change-money {
        font-size: 34px;
      }

      .cash-button {
        height: 48px;
        font-size: 22px;
      }

      .keypad {
        min-height: 220px;
      }

      .num-button {
        font-size: 26px;
      }

      .finish-button {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="count-row">
      <button class="count-button" id="minus">−</button>

      <div class="count-display">
        <div class="count-main" id="countDisplay">1本</div>
        <div class="count-price" id="totalDisplay">¥350</div>
      </div>

      <button class="count-button" id="plus">＋</button>
      <button class="count-button" id="plusFive">＋5</button>
    </section>

    <section class="received-section">
      <div class="received-row">
        <button class="clear-button" id="clearReceived">クリア</button>
        <div class="received-money" id="receivedDisplay">受取金額：¥0</div>
      </div>
    </section>

    <section class="change-section" id="changeBox">
      <div class="change-money" id="changeDisplay">お釣り：¥0</div>
    </section>

    <section class="cash-row">
      <button class="cash-button" data-add="1000">+1000</button>
      <button class="cash-button" data-add="500">+500</button>
      <button class="cash-button" data-add="50">+50</button>
    </section>

    <section class="keypad">
      <button class="num-button" data-num="7">7</button>
      <button class="num-button" data-num="8">8</button>
      <button class="num-button" data-num="9">9</button>

      <button class="num-button" data-num="4">4</button>
      <button class="num-button" data-num="5">5</button>
      <button class="num-button" data-num="6">6</button>

      <button class="num-button" data-num="1">1</button>
      <button class="num-button" data-num="2">2</button>
      <button class="num-button" data-num="3">3</button>

      <button class="num-button" data-num="0">0</button>
      <button class="num-button back-button" id="backspace">←</button>
      <button class="num-button finish-button" id="finish">会計<br>完了</button>
    </section>
  </main>

  <script>
    const PRICE = 350;

    let count = 1;
    let receivedText = "";

    const countDisplay = document.getElementById("countDisplay");
    const totalDisplay = document.getElementById("totalDisplay");
    const receivedDisplay = document.getElementById("receivedDisplay");
    const changeDisplay = document.getElementById("changeDisplay");
    const changeBox = document.getElementById("changeBox");

    function yen(value) {
      return "¥" + Number(value).toLocaleString("ja-JP");
    }

    function getReceived() {
      return receivedText === "" ? 0 : Number(receivedText);
    }

    function setReceived(value) {
      receivedText = value <= 0 ? "" : String(value);
      update();
    }

    function update() {
      const total = count * PRICE;
      const received = getReceived();
      const change = received - total;

      countDisplay.textContent = count + "本";
      totalDisplay.textContent = yen(total);
      receivedDisplay.textContent = "受取金額：" + yen(received);

      if (received === 0) {
        changeBox.classList.remove("shortage");
        changeDisplay.textContent = "お釣り：" + yen(0);
        return;
      }

      if (change < 0) {
        changeBox.classList.add("shortage");
        changeDisplay.textContent = "不足：" + yen(Math.abs(change));
      } else {
        changeBox.classList.remove("shortage");
        changeDisplay.textContent = "お釣り：" + yen(change);
      }
    }

    function resetAll() {
      count = 1;
      receivedText = "";
      update();
    }

    document.getElementById("minus").addEventListener("click", () => {
      count = Math.max(1, count - 1);
      update();
    });

    document.getElementById("plus").addEventListener("click", () => {
      count += 1;
      update();
    });

    document.getElementById("plusFive").addEventListener("click", () => {
      count += 5;
      update();
    });

    document.getElementById("clearReceived").addEventListener("click", () => {
      receivedText = "";
      update();
    });

    document.getElementById("finish").addEventListener("click", resetAll);

    document.getElementById("backspace").addEventListener("click", () => {
      receivedText = receivedText.slice(0, -1);
      update();
    });

    document.querySelectorAll(".num-button[data-num]").forEach(button => {
      button.addEventListener("click", () => {
        const num = button.dataset.num;

        if (receivedText.length >= 7) return;
        if (receivedText === "" && num === "0") return;

        receivedText += num;
        update();
      });
    });

    document.querySelectorAll(".cash-button").forEach(button => {
      button.addEventListener("click", () => {
        const addAmount = Number(button.dataset.add);
        const current = getReceived();
        setReceived(current + addAmount);
      });
    });

    document.addEventListener("dblclick", event => {
      event.preventDefault();
    });

    update();
  </script>
</body>
</html>
